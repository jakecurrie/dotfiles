format = """
$directory\
$git_branch\
$git_status\
$fill\
$python\
$lua\
$nodejs\
$golang\
$haskell\
$rust\
$dotnet\
$package\
$aws\
$azure\
$docker_context\
$jobs\
$cmd_duration\
$line_break\
$character"""

add_newline = true
palette = 'nord'

[directory]
style = 'bold fg:dark_blue'
format = '[$path ]($style)'
truncation_length = 3
truncation_symbol = 'ŌĆ”/'
truncate_to_repo = false

[directory.substitutions]
'Documents' = '¾░łÖ'
'Downloads' = '’ĆÖ '
'Music' = '’Ćü '
'Pictures' = '’ĆŠ '

[git_branch]
style = 'fg:green'
symbol = '’Éś '
format = '[on](white) [$symbol$branch ]($style)'

[git_status]
style = 'fg:green'
format = '([$all_status$ahead_behind]($style) )'

[fill]
symbol = ' '

[python]
style = 'teal'
symbol = 'ŅłĄ '
format = '[${symbol}${pyenv_prefix}(${version} )(\($virtualenv\) )]($style)'
pyenv_version_name = true
pyenv_prefix = ''

[lua]
symbol = 'ŅśĀ '

[nodejs]
style = 'blue'
symbol = 'Ņ£ś '

[golang]
style = 'blue'
symbol = 'Ņś¦ '

[haskell]
style = 'blue'
symbol = 'ŅØĘ '

[rust]
style = 'orange'
symbol = 'Ņ×© '

[dotnet]
symbol = 'ŅØ┐ '
style = 'blue'
format = 'via [$symbol($version )]($style)'

[package]
symbol = '¾░ÅŚ '

[aws]
symbol = '’ē░ '
style = 'yellow'
format = 'on [$symbol($profile )(\($region\) )]($style)'
disabled = true
[aws.region_aliases]
us-west-2 = 'W2'
us-east-1 = 'E1'
[aws.profile_aliases]
actual-profile-name = 'my-alias'

[azure]
disabled = false
format = 'on [$symbol($subscription)]($style) '
symbol = '¾░Āģ '
style = 'blue bold'
[azure.subscription_aliases]
actual-subscription-name = 'my-alias'

[docker_context]
symbol = '’īł '
style = 'fg:#06969A'
format = '[$symbol]($style) $path'
detect_files = ['docker-compose.yml', 'docker-compose.yaml', 'Dockerfile']
detect_extensions = ['Dockerfile']

[jobs]
symbol = '’Ćō '
style = 'red'
number_threshold = 1
format = '[$symbol]($style)'

[cmd_duration]
min_time = 500
style = 'fg:gray'
format = '[$duration]($style)'

