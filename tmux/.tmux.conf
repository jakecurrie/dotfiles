# ensure full colour range is used
set -ga terminal-overrides ",screen-256color*:Tc"
set-option -g default-terminal "screen-256color"

# remap prefix to Ctrl+space    
unbind C-b
set-option -g prefix C-space
bind C-space send-prefix

# use prefix+r to reload tmux config
bind r source-file ~/.tmux.conf

# use 1-indexing, specifically for window switching
set -g base-index 1

# use prefix + vim nav keys to switch panes 
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

# use more logical pane creation keybinds
bind '-' split-window -v -c "#(pane_current_path)"
bind '\' split-window -h -c "#(pane_current_path)"

# use prefix + numkeys to switch windows
unbind 0
bind '1' select-window -t 1
bind '2' select-window -t 2
bind '3' select-window -t 3
bind '4' select-window -t 4
bind '5' select-window -t 5
bind '6' select-window -t 6

# Rename session and window
bind C-r command-prompt -I "#{window_name}" "rename-window '%%'"
bind C-R command-prompt -I "#{session_name}" "rename-session '%%'"


